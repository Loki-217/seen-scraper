<!DOCTYPE html>
<html>
<head>
    <title>测试Browser控制</title>
</head>
<body>
    <h1>测试Playwright控制</h1>
    <input id="url" value="https://example.com">
    <button onclick="testNavigate()">测试导航</button>
    <div id="result">
        <img id="screenshot" style="max-width:100%">
    </div>
    
    <script>
        let ws;
        
        function connect() {
            ws = new WebSocket('ws://127.0.0.1:8000/ws/browser');
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                console.log('收到消息:', data.type);
                
                if (data.type === 'page_loaded') {
                    // 显示截图
                    document.getElementById('screenshot').src = 
                        'data:image/png;base64,' + data.data.screenshot;
                }
            };
            
            ws.onopen = () => {
                console.log('WebSocket已连接');
            };
        }
        
        function testNavigate() {
            const url = document.getElementById('url').value;
            ws.send(JSON.stringify({
                command: 'navigate',
                url: url
            }));
        }
        
        // 自动连接
        connect();
    </script>
</body>
</html>
