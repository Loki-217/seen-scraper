<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeenFetch - See it, Fetch it | Visual Web Scraper</title>
    <!-- 引用外部CSS文件 -->
    <link rel="stylesheet" href="css/index-v2.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="brand-logo">
            <div class="brand-icon">👁️</div>
            <div class="brand-name">SeenFetch</div>
            <div class="brand-tagline">See it, Fetch it</div>
        </div>

        <div class="url-container">
            <input type="url"
                   class="url-input"
                   id="urlInput"
                   placeholder="粘贴网页地址，开始可视化数据提取">

            <div class="mode-selector">
                <button class="mode-btn active" onclick="switchMode('manual')">👆 手动选择</button>
                <button class="mode-btn" onclick="switchMode('smart')">🤖 智能识别</button>
            </div>

            <button class="btn btn-primary" onclick="loadPage()">
                开始提取
            </button>
        </div>
    </header>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- 左侧工具栏（预留） -->
        <aside class="left-sidebar">
            <div class="sidebar-icon" title="功能预留">
                🏠
            </div>
            <div class="sidebar-icon" title="功能预留">
                👤
            </div>
            <div class="sidebar-icon" title="功能预留">
                ⚙️
            </div>
        </aside>

        <!-- 中间内容区 -->
        <div class="content-area">
            <!-- Web 预览区 -->
            <div class="preview-area">
                <div id="manualMode" style="width: 100%; height: 100%;">
                    <div id="loadingOverlay" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #666;">正在加载页面...</p>
                    </div>
                    <iframe id="previewFrame" class="preview-iframe"></iframe>
                </div>

                <div id="smartMode" class="smart-panel hidden">
                    <h2>🤖 智能分析结果</h2>

                    <div id="smartLoading" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #666;">AI正在分析页面结构...</p>
                    </div>

                    <div id="suggestionsList"></div>

                    <div class="action-bar">
                        <button class="btn btn-primary" style="flex: 1" onclick="applySmartSelections()">
                            应用选中的字段
                        </button>
                        <button class="btn" style="background: #e0e0e0" onclick="selectAllSuggestions()">
                            全选
                        </button>
                    </div>
                </div>
            </div>

            <!-- 底部数据预览区 -->
            <div class="data-preview-area">
                <div class="preview-header">
                    <h3>📊 数据预览</h3>
                    <button class="btn-export" id="exportBtn" onclick="exportData()" disabled>
                        📥 导出数据
                    </button>
                </div>
                <div class="preview-table-container">
                    <div id="previewContent" class="preview-empty">
                        请先确认字段名设置，然后点击"确认配置"以预览数据
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 绿色配置按钮 -->
    <button class="config-toggle-btn" onclick="toggleConfigModal()" title="配置采集字段">
        ⚙️
    </button>

    <!-- 配置弹窗 -->
    <div class="config-modal" id="configModal" onclick="closeModalOnBackdrop(event)">
        <div class="config-content" onclick="event.stopPropagation()">
            <div class="config-header">
                <h2>📋 采集配置</h2>
                <button class="close-btn" onclick="toggleConfigModal()">✕</button>
            </div>

            <div class="config-body">
                <div id="fieldsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>还没有配置任何字段</p>
                        <small>选择模式并开始分析页面</small>
                    </div>
                </div>
            </div>

            <div class="config-footer">
                <button class="btn btn-confirm" id="confirmBtn" onclick="confirmFields()" disabled>
                    ✓ 确认配置
                </button>
                <button class="btn btn-secondary" onclick="clearFields()">
                    清空
                </button>
            </div>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="login-modal" id="loginModal">
        <div class="login-modal-content">
            <div class="login-modal-header">
                <h2>
                    <span class="icon">🔐</span>
                    需要登录
                </h2>
                <button class="login-modal-close" onclick="closeLoginModal()">✕</button>
            </div>

            <div class="login-modal-body">
                <!-- 检测原因 -->
                <div class="login-reason">
                    <h4>⚠️ 检测到以下情况:</h4>
                    <ul id="loginReasons">
                        <li>页面需要登录才能访问</li>
                    </ul>
                </div>

                <!-- 登录选项 -->
                <div class="login-options" id="loginOptions">
                    <div class="login-option recommended" onclick="loginWithIframe()">
                        <div class="option-icon">🖼️</div>
                        <div class="option-content">
                            <div class="option-title">iframe 内嵌登录</div>
                            <div class="option-description">在弹窗中直接登录,方便快捷</div>
                        </div>
                    </div>

                    <div class="login-option" onclick="loginWithBrowser()">
                        <div class="option-icon">🌐</div>
                        <div class="option-content">
                            <div class="option-title">浏览器窗口登录</div>
                            <div class="option-description">打开独立浏览器,支持复杂验证</div>
                        </div>
                    </div>

                    <div class="login-option" onclick="showCookieImport()">
                        <div class="option-icon">📋</div>
                        <div class="option-content">
                            <div class="option-title">手动导入 Cookie</div>
                            <div class="option-description">已有Cookie? 直接粘贴导入</div>
                        </div>
                    </div>
                </div>

                <!-- iframe登录容器 -->
                <div class="iframe-login-container" id="iframeLoginContainer">
                    <!-- 动态填充 -->
                </div>

                <!-- Cookie导入区域 -->
                <div class="cookie-import-area" id="cookieImportArea">
                    <label>粘贴Cookie (JSON格式):</label>
                    <textarea
                        id="cookieImportTextarea"
                        class="cookie-import-textarea"
                        placeholder='[{"name":"session","value":"abc123","domain":".example.com"}]'
                    ></textarea>
                    <div class="cookie-import-buttons">
                        <button class="login-btn" onclick="backToLoginOptions()">返回</button>
                        <button class="login-btn login-btn-primary" onclick="importCookies()">导入</button>
                    </div>
                </div>

                <!-- 登录进度 -->
                <div class="login-progress" id="loginProgress">
                    <!-- 动态填充 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 引用外部JavaScript文件 -->
    <script src="js/index-v2.js"></script>
</body>
</html>
