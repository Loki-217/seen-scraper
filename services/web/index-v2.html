<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeenFetch v2.0 - See it, Fetch it</title>
    
    <!-- CSS 模块化加载 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout-v2.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="app">
        <!-- 🔝 顶部栏（5/6 宽度居中）-->
        <div class="header-wrapper">
            <header class="header">
                <div class="brand-logo">
                    <div class="brand-icon">👁️</div>
                    <div class="brand-name">SeenFetch</div>
                    <div class="brand-tagline">See it, Fetch it</div>
                </div>
                
                <div class="url-container">
                    <input type="url" 
                           class="url-input" 
                           id="urlInput"
                           placeholder="粘贴网页地址，开始可视化数据提取">
                    
                    <div class="mode-selector">
                        <button class="mode-btn active">👆 手动</button>
                        <button class="mode-btn">🤖 智能</button>
                    </div>
                    
                    <button class="btn btn-primary" id="loadBtn">
                        开始提取
                    </button>
                </div>
            </header>
        </div>
        
        <!-- 🟢 配置按钮（右上角悬浮）-->
        <div class="config-trigger" id="configTrigger" title="打开配置面板">
            <span style="font-size: 24px;">⚙️</span>
        </div>
        
        <!-- 主容器 -->
        <div class="main-wrapper">
            <!-- ⬅️ 左侧导航栏 -->
            <nav class="sidebar-left">
                <div class="nav-item active" data-tooltip="首页">🏠</div>
                <div class="nav-item" data-tooltip="任务历史">📋</div>
                <div class="nav-item" data-tooltip="我的数据">💾</div>
                <div class="nav-item" data-tooltip="用户中心">👤</div>
                <div style="flex: 1"></div>
                <div class="nav-item" data-tooltip="帮助文档">❓</div>
                <div class="nav-item" data-tooltip="设置">⚙️</div>
            </nav>
            
            <!-- 🖥️ 主工作区 -->
            <main class="main-content">
                <!-- 面包屑导航 -->
                <div class="breadcrumb-nav">
                    <span class="breadcrumb-item">首页</span>
                    <span class="breadcrumb-separator">›</span>
                    <span class="breadcrumb-item">新建任务</span>
                    <span class="breadcrumb-separator">›</span>
                    <span class="breadcrumb-item" style="color: var(--brand-primary);">配置字段</span>
                </div>
                
                <!-- 预览区域 -->
                <div class="preview-container">
                    <div id="manualMode" class="preview-pane">
                        <iframe id="previewFrame" style="width: 100%; height: 100%; border: none;"></iframe>
                    </div>
                    
                    <div id="smartMode" class="preview-pane hidden">
                        <div style="padding: var(--space-xl);">
                            <h2>🤖 智能分析结果</h2>
                            <div id="suggestionsList"></div>
                        </div>
                    </div>
                </div>
                
                <!-- 📊 底部数据预览区 -->
                <section class="data-preview-section">
                    <!-- 表格预览（1/3）-->
                    <div class="table-preview">
                        <div class="table-preview-header">
                            <h4>📋 数据预览</h4>
                            <div class="field-status">
                                <span class="status-badge success" id="fieldCountBadge">0 字段</span>
                                <span class="status-badge warning" id="statusBadge">未确认</span>
                            </div>
                        </div>
                        <div class="table-content" id="tablePreview">
                            <div class="empty-state" style="padding: 2rem;">
                                <p style="color: var(--text-tertiary); text-align: center;">
                                    配置字段后预览数据
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 统计信息区域（2/3）-->
                    <div class="stats-area">
                        <div class="stat-card">
                            <div>
                                <h5>预计采集</h5>
                                <div class="value" id="estimatedRows">0</div>
                            </div>
                            <div class="label">数据行</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #4CAF50, #45a049);">
                            <div>
                                <h5>已配置</h5>
                                <div class="value" id="configuredFields">0</div>
                            </div>
                            <div class="label">字段</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #f44336, #e53935);">
                            <div>
                                <h5>字段状态</h5>
                                <div class="value" id="fieldValidation">⚠️</div>
                            </div>
                            <div class="label" id="validationLabel">待确认</div>
                        </div>
                    </div>
                </section>
            </main>
            
            <!-- ➡️ 右侧快捷工具栏 -->
            <aside class="sidebar-right">
                <div class="quick-tool" data-tooltip="AI 助手" title="AI 助手">🤖</div>
                <div class="quick-tool" data-tooltip="数据预览" title="切换预览">👁️</div>
                <div class="quick-tool" data-tooltip="导出" title="导出数据">📥</div>
                <div class="quick-tool" data-tooltip="截图" title="截图">📸</div>
                <div style="flex: 1"></div>
                <div class="quick-tool" data-tooltip="反馈" title="反馈问题">💬</div>
            </aside>
        </div>
        
        <!-- 🎨 配置抽屉（从右侧滑出）-->
        <div class="drawer-overlay" id="drawerOverlay"></div>
        <aside class="config-drawer" id="configDrawer">
            <div class="drawer-header">
                <h3>⚙️ 采集配置</h3>
                <button class="drawer-close" id="drawerClose">✕</button>
            </div>
            
            <!-- 标签页 -->
            <div class="tab-container" style="padding: 0 var(--space-md);">
                <button class="tab active" data-tab="fields">采集字段</button>
                <button class="tab" data-tab="settings">高级设置</button>
            </div>
            
            <div style="flex: 1; overflow-y: auto; padding: var(--space-md);">
                <!-- 字段列表 -->
                <div id="fieldsTab" class="tab-content active">
                    <div id="fieldsList"></div>
                </div>
                
                <!-- 设置 -->
                <div id="settingsTab" class="tab-content hidden">
                    <div style="padding: var(--space-md);">
                        <label style="display: block; margin-bottom: var(--space-md);">
                            <strong>最大采集数量</strong>
                            <input type="number" 
                                   id="maxItems" 
                                   value="100" 
                                   min="1"
                                   max="10000"
                                   style="width: 100%; padding: var(--space-sm); margin-top: var(--space-xs); border: 1px solid var(--border-color); border-radius: var(--border-radius-sm);">
                        </label>
                        
                        <label style="display: flex; align-items: center; gap: var(--space-sm); margin-top: var(--space-md);">
                            <input type="checkbox" id="autoPaging" checked>
                            <span>自动翻页</span>
                        </label>
                        
                        <label style="display: flex; align-items: center; gap: var(--space-sm); margin-top: var(--space-sm);">
                            <input type="checkbox" id="removeDuplicates" checked>
                            <span>去除重复数据</span>
                        </label>
                    </div>
                </div>
            </div>
            
            <div style="padding: var(--space-md); border-top: 1px solid var(--border-color); background: var(--gray-50);">
                <button class="btn btn-success btn-block" id="startScrapingBtn">
                    🚀 开始采集
                </button>
                <button class="btn btn-secondary btn-block" id="clearFieldsBtn" style="margin-top: var(--space-sm);">
                    清空字段
                </button>
            </div>
        </aside>
    </div>
    
    <!-- JS 模块化加载 -->
    <script type="module" src="js/app-v2.js"></script>
</body>
</html>
