<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeenFetch - See it, Fetch it | Visual Web Scraper</title>
    <!-- 外部CSS -->
    <link rel="stylesheet" href="css/index-v2.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="brand-logo">
            <div class="brand-icon">👁️</div>
            <div class="brand-name">SeenFetch</div>
            <div class="brand-tagline">See it, Fetch it</div>
        </div>

        <div class="url-container">
            <input type="url"
                   class="url-input"
                   id="urlInput"
                   placeholder="粘贴网页地址，开始可视化数据提取">

            <div class="mode-selector">
                <button class="mode-btn active" onclick="switchMode('manual')">👆 手动选择</button>
                <button class="mode-btn" onclick="switchMode('smart')">🤖 智能识别</button>
            </div>

            <button class="btn btn-primary" onclick="loadPage()">
                开始提取
            </button>
        </div>
    </header>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- 左侧工具栏（预留） -->
        <aside class="left-sidebar">
            <div class="sidebar-icon" title="功能预留">
                🏠
            </div>
            <div class="sidebar-icon" title="功能预留">
                👤
            </div>
            <div class="sidebar-icon" title="功能预留">
                ⚙️
            </div>
        </aside>

        <!-- 中间内容区 -->
        <div class="content-area">
            <!-- Web 预览区 -->
            <div class="preview-area">
                <div id="manualMode" style="width: 100%; height: 100%;">
                    <div id="loadingOverlay" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #666;">正在加载页面...</p>
                    </div>
                    <iframe id="previewFrame" class="preview-iframe"></iframe>
                </div>

                <div id="smartMode" class="smart-panel hidden">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; height: 100%;">
                        <!-- Left: Preview -->
                        <div style="position: relative; height: 100%;">
                            <div id="smartPreviewLoading" class="loading-overlay hidden">
                                <div class="spinner"></div>
                                <p style="margin-top: 1rem; color: #666;">正在加载预览...</p>
                            </div>
                            <iframe id="smartPreviewFrame" class="preview-iframe"></iframe>
                        </div>

                        <!-- Right: Analysis results -->
                        <div style="display: flex; flex-direction: column; height: 100%;">
                            <h2>🤖 智能分析结果</h2>

                            <div id="smartLoading" class="loading-overlay hidden">
                                <div class="spinner"></div>
                                <p style="margin-top: 1rem; color: #666;">AI正在分析页面结构...</p>
                            </div>

                            <div id="suggestionsList" style="flex: 1; overflow-y: auto;"></div>

                            <div class="action-bar">
                                <button class="btn btn-primary" style="flex: 1" onclick="applySmartSelections()">
                                    应用选中的字段
                                </button>
                                <button class="btn" style="background: #e0e0e0" onclick="selectAllSuggestions()">
                                    全选
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 底部数据预览区 -->
            <div class="data-preview-area">
                <div class="preview-header">
                    <h3>📊 数据预览</h3>
                    <button class="btn-export" id="exportBtn" onclick="exportData()" disabled>
                        📥 导出数据
                    </button>
                </div>
                <div class="preview-table-container">
                    <div id="previewContent" class="preview-empty">
                        请先确认字段名设置，然后点击"确认配置"以预览数据
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 绿色配置按钮 -->
    <button class="config-toggle-btn" onclick="toggleConfigModal()" title="配置采集字段">
        ⚙️
    </button>

    <!-- 配置弹窗 -->
    <div class="config-modal" id="configModal" onclick="closeModalOnBackdrop(event)">
        <div class="config-content" onclick="event.stopPropagation()">
            <div class="config-header">
                <h2>📋 采集配置</h2>
                <button class="close-btn" onclick="toggleConfigModal()">✕</button>
            </div>

            <div class="config-body">
                <div id="fieldsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>还没有配置任何字段</p>
                        <small>选择模式并开始分析页面</small>
                    </div>
                </div>
            </div>

            <div class="config-footer">
                <button class="btn btn-confirm" id="confirmBtn" onclick="confirmFields()" disabled>
                    ✓ 确认配置
                </button>
                <button class="btn btn-secondary" onclick="clearFields()">
                    清空
                </button>
            </div>
        </div>
    </div>

    <!-- 手动模式数据预览区（新增，用于手动模式） -->
    <div id="manualPreviewContent" class="preview-empty" style="display: none;">
        请先确认字段名设置，然后点击"确认配置"以预览数据
    </div>

    <!-- 外部JavaScript -->
    <script src="js/index-v2.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
