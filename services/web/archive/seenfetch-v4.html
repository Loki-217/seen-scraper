<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>SeenFetch - 完全可视化爬虫</title>
    <style>
        /* 基础样式保持不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        .browser-view {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: auto;
            background: #f0f0f0;
        }
        
        .screenshot-container {
            position: relative;
            display: inline-block;
        }
        
        .screenshot {
            max-width: 100%;
            display: block;
        }
        
        .clickable-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        
        .element-highlight {
            position: absolute;
            border: 2px solid #4CAF50;
            background: rgba(76, 175, 80, 0.1);
            pointer-events: none;
            z-index: 1000;
        }
        
        .similar-confirm-dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👁️ SeenFetch</h1>
        <input type="url" id="urlInput" placeholder="输入网址">
        <button onclick="navigateToUrl()">开始采集</button>
    </div>
    
    <div class="main-container">
        <div class="browser-view" id="browserView">
            <div class="screenshot-container">
                <img id="screenshot" class="screenshot" style="display:none;">
                <div class="clickable-overlay" id="clickableOverlay"></div>
            </div>
        </div>
        
        <div class="config-panel">
            <!-- 配置面板保持原样 -->
        </div>
    </div>
    
    <script>
        let ws = null;
        let currentSession = null;
        
        // 建立WebSocket连接
        function connectWebSocket() {
            ws = new WebSocket('ws://127.0.0.1:8000/ws/browser');
            
            ws.onopen = () => {
                console.log('WebSocket连接成功');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket错误:', error);
            };
        }
        
        // 处理WebSocket消息
        function handleWebSocketMessage(data) {
            switch(data.type) {
                case 'session_created':
                    currentSession = data.session_id;
                    console.log('会话创建:', currentSession);
                    break;
                    
                case 'page_loaded':
                    displayPage(data.data);
                    break;
                    
                case 'element_clicked':
                    handleElementClick(data.data);
                    break;
                    
                case 'data_extracted':
                    displayExtractedData(data.data);
                    break;
            }
        }
        
        // 显示页面截图
        function displayPage(pageData) {
            const screenshot = document.getElementById('screenshot');
            screenshot.src = 'data:image/png;base64,' + pageData.screenshot;
            screenshot.style.display = 'block';
            
            // 设置可点击区域
            setupClickableAreas(pageData.elements);
        }
        
        // 设置可点击区域
        function setupClickableAreas(elements) {
            const overlay = document.getElementById('clickableOverlay');
            overlay.innerHTML = '';
            
            overlay.addEventListener('click', (e) => {
                const rect = screenshot.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 发送点击位置到后端
                ws.send(JSON.stringify({
                    command: 'click',
                    x: x,
                    y: y
                }));
            });
        }
        
        // 处理元素点击响应
        function handleElementClick(data) {
            if (data.similar_count > 1) {
                // 显示相似元素确认对话框
                showSimilarConfirmDialog(data);
            }
            
            // 更新截图显示高亮
            const screenshot = document.getElementById('screenshot');
            screenshot.src = 'data:image/png;base64,' + data.screenshot;
        }
        
        // 导航到URL
        function navigateToUrl() {
            const url = document.getElementById('urlInput').value;
            if (!url) return;
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                connectWebSocket();
                setTimeout(() => navigateToUrl(), 1000);
                return;
            }
            
            ws.send(JSON.stringify({
                command: 'navigate',
                url: url
            }));
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
        });
    </script>
</body>
</html>
