<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeenFetch - See it, Fetch it | Visual Web Scraper</title>
    <meta name="description" content="SeenFetch: The easiest way to extract data from websites. No coding required.">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
    
    <!-- 样式 -->
    <link rel="stylesheet" href="css/index-v2.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="brand-logo">
            <div class="brand-icon">👁️</div>
            <div class="brand-name">SeenFetch</div>
            <div class="brand-tagline">See it, Fetch it</div>
        </div>
        
        <div class="url-container">
            <input type="url" 
                   class="url-input" 
                   id="urlInput"
                   placeholder="粘贴网页地址，开始可视化数据提取">
            
            <div class="mode-selector">
                <button type="button" class="mode-btn active" onclick="switchMode('manual')"> 手动选择</button>
                <button type="button" class="mode-btn" onclick="switchMode('smart')"> 智能识别</button>
            </div>
            
            <button type="button" class="btn btn-primary" onclick="loadPage()">
                开始提取
            </button>
        </div>
    </header>
    
    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <!-- 左侧工具栏 -->
        <aside class="left-sidebar">
            <div class="sidebar-icon" title="功能预留">🏠</div>
            <div class="sidebar-icon" title="功能预留">👤</div>
            <div class="sidebar-icon" title="功能预留">⚙️</div>
        </aside>
        
            <!-- 手动模式 -->
        <div id="manualMode" class="mode-content">
            <div class="preview-section">
                <!-- 左侧：网页预览 -->
                <div class="web-preview">
                    <div class="preview-header">
                        <h3> 网页预览</h3>
                        <button type="button" class="btn btn-secondary" onclick="toggleConfigModal()">
                            ⚙️ 配置字段
                        </button>
                    </div>
                    <div class="preview-container">
                        <!-- 加载提示 -->
                        <div id="loadingOverlay" class="loading-overlay hidden">
                            <div class="spinner"></div>
                            <p>正在加载页面...</p>
                        </div>
                        
                        <!-- iframe 预览 -->
                        <iframe id="previewFrame" class="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
                    </div>
                </div>

                <!-- 右侧：数据预览 -->
                <div class="data-preview">
                    <div class="preview-header">
                        <h3> 数据预览</h3>
                        <button id="manualExportBtn" class="btn btn-success" onclick="exportData()" disabled>
                             导出数据
                        </button>
                    </div>
                    <div id="manualPreviewContent" class="preview-content">
                        <div class="preview-empty">
                            请先配置字段并确认，然后开始采集数据
                        </div>
                    </div>
                </div>
            </div>
        </div>
                        
                <!-- 智能模式：分屏布局 -->
        <div id="smartMode" class="smart-panel hidden" style="display: flex; height: 100%; padding: 0;">
            <!-- 🔥 左侧：页面预览 (50%) -->
            <div class="smart-preview-pane" style="flex: 1; position: relative; margin-right: 0.5rem;">
                <div style="padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 12px 12px 0 0;">
                    <h3 style="margin: 0; font-size: 1.1rem;"> 页面预览</h3>
                </div>
                
                <div style="position: relative; height: calc(100% - 60px); background: white; border-radius: 0 0 12px 12px; overflow: hidden;">
                    <div id="smartPreviewLoading" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #666;">正在加载页面...</p>
                    </div>
                    <iframe id="smartPreviewFrame" style="width: 100%; height: 100%; border: none;" sandbox="allow-scripts allow-same-origin"></iframe>
                </div>
            </div>
            
            <!-- 🔥 右侧：智能分析结果 (50%) -->
            <div class="smart-analysis-pane" style="flex: 1; display: flex; flex-direction: column; background: white; border-radius: 12px; overflow: hidden;">
                <div style="padding: 1rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h3 style="margin: 0; font-size: 1.1rem;"> 智能分析结果</h3>
                </div>
                
                <div style="position: relative; flex: 1; display: flex; flex-direction: column;">
                    <div id="smartLoading" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <p style="margin-top: 1rem; color: #666;">AI正在分析页面结构...</p>
                    </div>
                    
                    <div id="suggestionsList" style="flex: 1; overflow-y: auto; padding: 1rem;"></div>
                    
                    <div class="action-bar" style="padding: 1rem; border-top: 2px solid #e0e0e0; display: flex; gap: 0.5rem;">
                        <button type="button" class="btn btn-primary" style="flex: 1" onclick="applySmartSelections()">
                            应用选中的字段
                        </button>
                        <button type="button" class="btn" style="background: #e0e0e0; color: #333;" onclick="selectAllSuggestions()">
                            全选
                        </button>
                    </div>
                </div>
            </div>
        </div>
            
            
    
    <!-- 绿色配置按钮 -->
    <button type="button" class="config-toggle-btn" onclick="toggleConfigModal()" title="配置采集字段">
        ⚙️
    </button>
    
    <!-- 配置弹窗 -->
    <div class="config-modal" id="configModal" onclick="closeModalOnBackdrop(event)">
        <div class="config-content" onclick="event.stopPropagation()">
            <div class="config-header">
                <h2>📋 采集配置</h2>
                <button type="button" class="close-btn" onclick="toggleConfigModal()">✕</button>
            </div>
            
            <div class="config-body">
                <div id="fieldsList">
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>还没有配置任何字段</p>
                        <small>选择模式并开始分析页面</small>
                    </div>
                </div>
            </div>
            
            <div class="config-footer">
                <button type="button" class="btn btn-confirm" id="confirmBtn" onclick="confirmFields()" disabled>
                    ✓ 确认配置
                </button>
                <button type="button" class="btn btn-secondary" onclick="clearFields()">
                    清空
                </button>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <!-- 🐛 调试脚本 - 用于追踪页面刷新问题 -->
    <script src="js/debug-refresh.js"></script>
    <script src="js/index-v2.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
