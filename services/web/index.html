<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeenFetch - Dashboard</title>
  <link rel="stylesheet" href="css/home.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <span class="brand-icon">👁️</span>
        <span class="brand-text">SeenFetch</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="topbarUsername" style="color:#6b7280;font-size:13px;font-weight:500;"></span>
        <button onclick="logout()" style="background:none;border:1px solid #e5e7eb;border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;color:#374151;">Logout</button>
      </div>
    </div>
  </header>

  <main class="content">
    <div class="content-header">
      <div class="content-header-left">
        <h1 class="content-title">My Robots</h1>
        <span class="stats-badge" id="statsBadge"></span>
      </div>
      <button class="btn-new-robot" id="btnNewRobot">+ Build New Robot</button>
    </div>

    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="Search" />
    </div>

    <div id="robotList" class="robot-list"></div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
