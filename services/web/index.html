<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeenFetch - Dashboard</title>
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand">
        <span class="brand-icon">👁️</span>
        <span class="brand-text">SeenFetch</span>
      </div>
    </div>
  </header>

  <main class="content">
    <div class="content-header">
      <div class="content-header-left">
        <h1 class="content-title">My Robots</h1>
        <span class="stats-badge" id="statsBadge"></span>
      </div>
      <button class="btn-new-robot" id="btnNewRobot">+ Build New Robot</button>
    </div>

    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="Search" />
    </div>

    <div id="robotList" class="robot-list"></div>
  </main>

  <script src="js/home.js"></script>
</body>
</html>
