<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeenFetch - See it, Fetch it | Visual Web Scraper</title>
    <meta name="description" content="SeenFetch: The easiest way to extract data from websites. No coding required.">
    
    <!-- CSS 模块化加载 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- 主应用容器 -->
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="brand-logo">
                <div class="brand-icon">👁️</div>
                <div class="brand-name">SeenFetch</div>
                <div class="brand-tagline">See it, Fetch it</div>
            </div>
            
            <div class="url-container">
                <input type="url" 
                       class="url-input" 
                       id="urlInput"
                       placeholder="粘贴网页地址，开始可视化数据提取">
                
                <div class="mode-selector">
                    <button class="mode-btn active">👆 手动选择</button>
                    <button class="mode-btn">🤖 智能识别</button>
                </div>
                
                <button class="btn btn-primary" id="loadBtn">
                    开始提取
                </button>
            </div>
        </header>
        
        <!-- Main Container -->
        <main class="main-container">
            <!-- 手动模式：iframe 预览 -->
            <div id="manualMode" class="preview-pane">
                <iframe id="previewFrame" class="preview-iframe"></iframe>
            </div>
            
            <!-- 智能模式：分析结果 -->
            <div id="smartMode" class="smart-panel hidden">
                <h2>🤖 智能分析结果</h2>
                
                <!-- 统计信息 -->
                <div id="statsBox" class="stats-box hidden">
                    <h3>页面统计</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <span class="stat-value" id="statWords">0</span>
                            <span class="stat-label">总词数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="statLinks">0</span>
                            <span class="stat-label">链接数</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="statImages">0</span>
                            <span class="stat-label">图片数</span>
                        </div>
                    </div>
                </div>
                
                <!-- 建议列表 -->
                <div id="suggestionsList"></div>
                
                <!-- 操作按钮 -->
                <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                    <button class="btn btn-success btn-block" id="applySelectionsBtn">
                        应用选中的字段
                    </button>
                    <button class="btn btn-secondary" id="selectAllBtn">
                        全选
                    </button>
                </div>
            </div>
            
            <!-- 右侧配置面板 -->
            <aside class="config-pane">
                <div class="config-header">
                    <h2>📋 采集配置</h2>
                    <div class="tips">
                        💡 选择模式并加载页面开始配置
                    </div>
                </div>
                
                <!-- 标签页 -->
                <div class="tab-container">
                    <button class="tab active" data-tab="fields">采集字段</button>
                    <button class="tab" data-tab="settings">设置</button>
                </div>
                
                <div class="config-body">
                    <!-- 字段列表标签页 -->
                    <div id="fieldsTab" class="tab-content active">
                        <div id="fieldsList"></div>
                    </div>
                    
                    <!-- 设置标签页 -->
                    <div id="settingsTab" class="tab-content">
                        <div style="padding: var(--space-md);">
                            <label style="display: block; margin-bottom: var(--space-md);">
                                <strong>最大采集数量</strong>
                                <input type="number" 
                                       id="maxItems" 
                                       value="100" 
                                       min="1"
                                       max="1000"
                                       style="width: 100%; padding: var(--space-sm); margin-top: var(--space-xs); border: 1px solid var(--border-color); border-radius: var(--border-radius-sm);">
                            </label>
                            
                            <label style="display: flex; align-items: center; gap: var(--space-sm); margin-top: var(--space-md);">
                                <input type="checkbox" id="autoPaging" checked>
                                <span>自动翻页</span>
                            </label>
                            
                            <label style="display: flex; align-items: center; gap: var(--space-sm); margin-top: var(--space-sm);">
                                <input type="checkbox" id="removeDuplicates" checked>
                                <span>去除重复数据</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="config-footer">
                    <button class="btn btn-success btn-block" id="startScrapingBtn">
                        🚀 开始采集
                    </button>
                    <button class="btn btn-secondary btn-block" id="clearFieldsBtn" style="margin-top: var(--space-sm);">
                        清空字段
                    </button>
                </div>
            </aside>
        </main>
    </div>
    
    <!-- JS 模块化加载 -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
