<!doctype html>
<meta charset="utf-8" />
<title>SeenScraper · Dev UI</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, Arial; margin: 20px; line-height: 1.5; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { border: 1px solid #ddd; padding: 16px; border-radius: 12px; }
  label { display: block; margin-top: 8px; font-weight: 600; }
  input, textarea, select { width: 100%; padding: 8px; font-family: inherit; }
  button { padding: 8px 12px; margin-top: 12px; cursor: pointer; }
  pre { background: #111; color: #0f0; padding: 12px; border-radius: 8px; overflow: auto; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } pre { white-space: pre-wrap; } }
</style>

<h1>SeenScraper · Dev UI</h1>
<p>后端需运行在 <code>http://127.0.0.1:8000</code>。</p>

<div class="grid">
  <div class="card">
    <h2>Remote page preview <small>(POST /play/preview)</small></h2>
    <label>URL <input id="url" value="https://example.com"></label>
    <label>Selector <input id="selector" value="h1"></label>
    <label>Attr
      <select id="attr">
        <option>text</option><option>href</option><option>src</option>
      </select>
    </label>
    <label>Wait selector (optional) <input id="wait"></label>
    <label>Limit <input id="limit" type="number" value="5" min="1"></label>
    <button onclick="play()">Run</button>
    <pre id="playOut"></pre>
  </div>

  <div class="card">
    <h2>Local HTML preview <small>(POST /templates/preview)</small></h2>
    <label>HTML
      <textarea id="html" rows="8">&lt;article&gt;&lt;h1&gt;标题&lt;/h1&gt;&lt;a class="link" href="/x"&gt;X&lt;/a&gt;&lt;/article&gt;</textarea>
    </label>
    <label>Selector <input id="sel2" value="a.link"></label>
    <label>Attr
      <select id="attr2">
        <option>text</option><option selected>href</option><option>src</option>
      </select>
    </label>
    <label>Limit <input id="limit2" type="number" value="10" min="1"></label>
    <button onclick="tmpl()">Run</button>
    <pre id="tmplOut"></pre>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000";

async function play() {
  const body = {
    url: document.getElementById('url').value,
    selector: document.getElementById('selector').value,
    attr: document.getElementById('attr').value,
    wait_selector: document.getElementById('wait').value || null,
    limit: Number(document.getElementById('limit').value),
  };
  try {
    const r = await fetch(API + "/play/preview", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    document.getElementById('playOut').textContent =
      JSON.stringify(await r.json(), null, 2);
  } catch (e) { document.getElementById('playOut').textContent = String(e); }
}

async function tmpl() {
  const body = {
    html: document.getElementById('html').value,
    selector: document.getElementById('sel2').value,
    attr: document.getElementById('attr2').value,
    limit: Number(document.getElementById('limit2').value),
  };
  try {
    const r = await fetch(API + "/templates/preview", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    document.getElementById('tmplOut').textContent =
      JSON.stringify(await r.json(), null, 2);
  } catch (e) { document.getElementById('tmplOut').textContent = String(e); }
}
</script>
