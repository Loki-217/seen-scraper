version: '3.8'

services:
  backend:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: seenfetch-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./services/api/data:/app/data        # 持久化结果文件
      - ./services/api/seen.db:/app/seen.db  # 持久化数据库
      - ./.env:/app/.env:ro                  # 环境变量（只读）
    environment:
      - TZ=Asia/Shanghai

  frontend:
    image: nginx:alpine
    container_name: seenfetch-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./services/web:/usr/share/nginx/html:ro          # 前端静态文件
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro   # Nginx 配置
    depends_on:
      - backend
